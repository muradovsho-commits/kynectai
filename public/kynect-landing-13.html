<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Kynect — AI Networking for Finance Students</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
::root{
  --black:#0a0a0a;--white:#fff;
  --g50:#f8f8f7;--g100:#f0efed;--g200:#e4e2de;--g400:#9e9b96;--g600:#6b6860;
  --green:#16a34a;--red:#dc2626;--amber:#f59e0b;--blue:#3b82f6;
}
html{scroll-behavior:smooth;}
body{font-family:'DM Sans',sans-serif;background:var(--white);color:var(--black);overflow-x:hidden;-webkit-font-smoothing:antialiased;}

/* ── NAV ── */
nav{position:fixed;top:0;left:0;right:0;z-index:100;display:flex;align-items:center;justify-content:space-between;padding:0 48px;height:62px;transition:all 0.3s;}
nav.scrolled{background:rgba(255,255,255,0.93);backdrop-filter:blur(14px);border-bottom:1px solid var(--g200);height:56px;}
.nav-logo{font-family:'Instrument Serif',serif;font-size:22px;letter-spacing:-0.5px;color:var(--black);text-decoration:none;}
.nav-logo em{font-style:italic;}
.nav-links{display:flex;gap:32px;}
.nav-links a{font-size:14px;color:var(--g600);text-decoration:none;font-weight:500;transition:color 0.15s;}
.nav-links a:hover{color:var(--black);}
.nav-actions{display:flex;align-items:center;gap:10px;}
.nav-signin{font-size:13px;color:var(--g600);text-decoration:none;font-weight:500;padding:7px 14px;border-radius:8px;transition:color 0.15s;}
.nav-signin:hover{color:var(--black);}
.nav-cta{background:var(--black);color:var(--white);padding:8px 18px;border-radius:8px;font-size:13px;font-weight:600;text-decoration:none;transition:opacity 0.15s,transform 0.15s;}
.nav-cta:hover{opacity:0.85;transform:translateY(-1px);}

/* ── HERO ── */
.hero{min-height:100vh;display:grid;grid-template-columns:1fr 1fr;gap:56px;align-items:center;padding:100px 48px 80px;max-width:1280px;margin:0 auto;}
.hero-badge{display:inline-flex;align-items:center;gap:8px;background:var(--g100);border:1px solid var(--g200);border-radius:100px;padding:5px 14px;font-size:11px;font-weight:700;color:var(--g600);margin-bottom:24px;letter-spacing:0.3px;text-transform:uppercase;animation:fadeUp 0.5s ease both;}
.hero-badge::before{content:'';width:6px;height:6px;background:#22c55e;border-radius:50%;animation:pulse 2s infinite;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}
.hero h1{font-family:'Instrument Serif',serif;font-size:clamp(44px,5.5vw,72px);line-height:1.0;letter-spacing:-2px;margin-bottom:20px;animation:fadeUp 0.5s 0.08s ease both;}
.hero h1 em{font-style:italic;}
.hero-sub{font-size:17px;color:var(--g600);max-width:480px;line-height:1.65;margin-bottom:14px;animation:fadeUp 0.5s 0.16s ease both;}
.hero-typing-row{font-size:13px;color:var(--g400);margin-bottom:28px;min-height:20px;animation:fadeUp 0.5s 0.2s ease both;}
.hero-typing-row strong{color:var(--black);font-weight:600;}
.hero-btns{display:flex;gap:12px;flex-wrap:wrap;animation:fadeUp 0.5s 0.26s ease both;margin-bottom:10px;}
.btn-primary{background:var(--black);color:var(--white);padding:13px 28px;border-radius:10px;font-size:14px;font-weight:600;text-decoration:none;transition:all 0.15s;}
.btn-primary:hover{opacity:0.85;transform:translateY(-1px);}
.btn-secondary{background:var(--white);color:var(--black);padding:13px 28px;border-radius:10px;font-size:14px;font-weight:500;text-decoration:none;border:1.5px solid var(--g200);transition:all 0.15s;}
.btn-secondary:hover{border-color:var(--black);transform:translateY(-1px);}
.hero-reassure{font-size:11px;color:var(--g400);animation:fadeUp 0.5s 0.3s ease both;margin-bottom:24px;}
.hero-proof{display:flex;align-items:center;gap:10px;animation:fadeUp 0.5s 0.36s ease both;}
.proof-avatars{display:flex;}
.proof-av{width:26px;height:26px;border-radius:50%;border:2px solid var(--white);margin-left:-6px;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;color:white;}
.proof-av:first-child{margin-left:0;}
.hero-proof-text{font-size:12px;color:var(--g600);}

/* Hero demo window */
.hero-right{animation:fadeUp 0.6s 0.12s ease both;}
.demo-win{background:var(--white);border:1px solid var(--g200);border-radius:16px;box-shadow:0 8px 40px rgba(0,0,0,0.08),0 2px 8px rgba(0,0,0,0.04);overflow:hidden;}
.demo-bar{display:flex;align-items:center;gap:6px;padding:10px 14px;background:var(--g50);border-bottom:1px solid var(--g200);}
.demo-dot{width:10px;height:10px;border-radius:50%;}
.demo-url{font-size:11px;color:var(--g400);margin-left:6px;}
.demo-search{padding:14px 18px;font-size:13px;color:var(--g600);border-bottom:1px solid var(--g100);display:flex;align-items:center;gap:10px;}
.demo-search-icon{width:13px;height:13px;opacity:0.4;}
.demo-typing-text{color:var(--black);font-weight:500;}
.demo-cursor{display:inline-block;width:2px;height:13px;background:var(--black);animation:blink 1s step-end infinite;vertical-align:middle;margin-left:1px;}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}
.demo-results{padding:6px 0;}
.demo-result{display:flex;align-items:center;justify-content:space-between;padding:11px 18px;border-bottom:1px solid var(--g100);opacity:0;animation:fadeIn 0.4s ease forwards;}
.demo-result:last-child{border-bottom:none;}
.demo-result:nth-child(1){animation-delay:1.2s;}
.demo-result:nth-child(2){animation-delay:1.6s;}
.demo-result:nth-child(3){animation-delay:2.0s;}
.res-name{font-size:13px;font-weight:600;}
.res-meta{font-size:11px;color:var(--g400);margin-top:2px;}
.res-tags{display:flex;gap:5px;}
.rtag{font-size:10px;font-weight:600;padding:2px 8px;border-radius:100px;}
.rtag-li{background:#e8f0fe;color:#1d4ed8;}
.rtag-em{background:#f0fdf4;color:#16a34a;}
.demo-compose{border-top:1px solid var(--g200);padding:12px 14px;}
.compose-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;}
.compose-title{font-size:11px;font-weight:700;}
.compose-badge{font-size:9px;font-weight:700;background:var(--g100);color:var(--g600);padding:2px 6px;border-radius:4px;}
.compose-msg{background:var(--g50);border:1px solid var(--g200);border-radius:8px;padding:9px 12px;font-size:10px;color:var(--g600);line-height:1.6;min-height:48px;}

/* ── SOCIAL PROOF STRIP ── */
.strip{background:var(--g50);border-top:1px solid var(--g200);border-bottom:1px solid var(--g200);padding:18px 48px;font-size:12px;color:var(--g400);display:flex;align-items:center;justify-content:center;gap:16px;flex-wrap:wrap;}
.strip span{font-weight:600;color:var(--g600);}

/* ── LAYOUT SECTIONS ── */
.section{padding:80px 48px;max-width:1120px;margin:0 auto;}
.section-header{margin-bottom:40px;}
.section-kicker{font-size:11px;font-weight:700;color:var(--g400);text-transform:uppercase;letter-spacing:1.4px;margin-bottom:10px;}
.section-title{font-family:'Instrument Serif',serif;font-size:clamp(32px,4vw,46px);line-height:1.1;letter-spacing:-1px;margin-bottom:10px;}
.section-title em{font-style:italic;}
.section-sub{font-size:15px;color:var(--g600);max-width:460px;line-height:1.6;}

/* problems grid */
.problems-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:18px;margin-top:20px;}
.problem-card{border:1px solid var(--g200);border-radius:14px;padding:22px 20px;background:var(--white);}
.problem-emoji{font-size:22px;margin-bottom:8px;}
.problem-title{font-size:14px;font-weight:600;margin-bottom:6px;}
.problem-copy{font-size:13px;color:var(--g600);line-height:1.55;}

/* dual feature rows */
.feature-row{display:grid;grid-template-columns:1.1fr 1.1fr;gap:32px;margin-top:32px;align-items:flex-start;}
.feature-card{border:1px solid var(--g200);border-radius:16px;padding:22px 20px;background:var(--white);}
.feature-label{font-size:11px;font-weight:700;color:var(--g400);text-transform:uppercase;letter-spacing:1.4px;margin-bottom:8px;}
.feature-head{font-size:16px;font-weight:700;margin-bottom:8px;}
.feature-text{font-size:13px;color:var(--g600);line-height:1.6;margin-bottom:14px;}
.feature-pill-row{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px;}
.f-pill{font-size:11px;font-weight:600;padding:4px 9px;border-radius:100px;background:var(--g50);color:var(--g600);}

.mini-search{background:var(--g50);border-radius:10px;border:1px solid var(--g200);padding:10px 12px;font-size:11px;margin-bottom:8px;display:flex;align-items:center;gap:6px;}
.mini-tagline{font-size:11px;color:var(--g400);margin-bottom:4px;}
.mini-list{font-size:11px;color:var(--g600);line-height:1.6;}

.steps-list{margin-top:10px;}
.step{display:flex;gap:10px;margin-bottom:10px;font-size:12px;color:var(--g600);}
.step-badge{width:18px;height:18px;border-radius:999px;background:var(--black);color:var(--white);font-size:11px;display:flex;align-items:center;justify-content:center;font-weight:600;margin-top:1px;}
.step-title{font-weight:600;color:var(--black);}

/* job / outcomes row */
.stats-row{display:grid;grid-template-columns:1.2fr 1fr;gap:28px;margin-top:32px;}
.stats-card{border:1px solid var(--g200);border-radius:16px;padding:22px 20px;background:var(--white);}
.jobs-list{margin-top:10px;}
.job{border:1px solid var(--g200);border-radius:10px;padding:10px 12px;font-size:11px;display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;background:var(--g50);}
.job-main{display:flex;flex-direction:column;gap:2px;}
.job-role{font-weight:600;}
.job-meta{color:var(--g400);}
.job-pill{font-size:10px;font-weight:600;padding:3px 8px;border-radius:100px;background:#fef3c7;color:#92400e;}
.metric-row{display:flex;align-items:center;justify-content:space-between;font-size:12px;margin-bottom:8px;}
.metric-label{color:var(--g600);}
.metric-value{font-weight:700;}
.metric-bar-bg{flex:1;height:6px;background:var(--g100);border-radius:3px;margin-left:10px;overflow:hidden;}
.metric-bar{height:100%;border-radius:3px;background:var(--black);}

/* pricing */
.pricing-section{background:var(--g50);padding:80px 48px;margin-top:60px;border-top:1px solid var(--g200);border-bottom:1px solid var(--g200);}
.pricing-inner{max-width:920px;margin:0 auto;display:grid;grid-template-columns:1.1fr 1fr;gap:32px;align-items:flex-start;}
.pricing-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
.plan{border-radius:16px;border:1.5px solid var(--g200);padding:22px 20px;background:var(--white);}
.plan.pro{border-color:var(--black);position:relative;}
.plan-label{font-size:11px;font-weight:700;color:var(--g400);text-transform:uppercase;letter-spacing:1.2px;margin-bottom:6px;}
.plan-name{font-size:15px;font-weight:700;margin-bottom:4px;}
.plan-price{font-size:32px;font-weight:800;letter-spacing:-1px;margin-bottom:2px;}
.plan-price span{font-size:13px;font-weight:400;color:var(--g400);}
.plan-copy{font-size:12px;color:var(--g600);margin-bottom:12px;}
.plan-feature{font-size:12px;color:var(--g600);padding:4px 0;display:flex;gap:8px;}
.plan-feature::before{content:'✓';font-size:11px;font-weight:700;color:var(--black);}
.plan-cta{margin-top:16px;display:block;text-align:center;padding:10px;border-radius:9px;font-size:13px;font-weight:600;text-decoration:none;transition:all 0.15s;}
.plan-cta.outline{border:1.5px solid var(--g200);color:var(--black);background:var(--white);}
.plan-cta.outline:hover{border-color:var(--black);transform:translateY(-1px);}
.plan-cta.solid{background:var(--black);color:var(--white);}
.plan-cta.solid:hover{opacity:0.85;transform:translateY(-1px);}
.badge{position:absolute;top:-10px;right:16px;background:var(--black);color:#fff;font-size:10px;font-weight:700;padding:3px 10px;border-radius:999px;}

/* FAQ */
.faq-section{padding:80px 48px;max-width:920px;margin:0 auto;}
.faq-grid{display:grid;grid-template-columns:1.1fr 1.4fr;gap:40px;}
.faq-list{margin-top:8px;}
.faq-item{border-bottom:1px solid var(--g200);}
.faq-q{width:100%;display:flex;align-items:center;justify-content:space-between;padding:16px 0;font-size:14px;font-weight:500;background:none;border:none;cursor:pointer;text-align:left;color:var(--black);}
.faq-q .icon{font-size:16px;color:var(--g400);transition:transform 0.2s;flex-shrink:0;}
.faq-a{font-size:13px;color:var(--g600);line-height:1.7;padding-bottom:16px;display:none;}
.faq-item.open .faq-a{display:block;}
.faq-item.open .icon{transform:rotate(45deg);}

/* CTA band */
.cta-band{margin:0 48px 60px;background:var(--black);border-radius:20px;padding:38px 40px;display:flex;align-items:center;justify-content:space-between;gap:26px;color:#f9fafb;}
.cta-text{font-family:'Instrument Serif',serif;font-size:clamp(26px,3vw,34px);letter-spacing:-1px;line-height:1.2;max-width:520px;}
.cta-text em{font-style:italic;}
.cta-sub{font-size:13px;color:#d1d5db;margin-top:6px;}
.cta-actions{display:flex;gap:10px;flex-wrap:wrap;}
.cta-btn-primary{background:#f9fafb;color:var(--black);padding:11px 20px;border-radius:999px;font-size:13px;font-weight:600;text-decoration:none;transition:opacity 0.15s,transform 0.15s;}
.cta-btn-primary:hover{opacity:0.9;transform:translateY(-1px);}
.cta-btn-ghost{background:transparent;color:#e5e7eb;padding:11px 16px;border-radius:999px;font-size:13px;font-weight:500;text-decoration:none;border:1px solid rgba(148,163,184,0.6);transition:background 0.15s,transform 0.15s;}
.cta-btn-ghost:hover{background:rgba(15,23,42,0.6);transform:translateY(-1px);}

/* FOOTER */
footer{padding:40px 48px 32px;border-top:1px solid var(--g200);font-size:12px;color:var(--g400);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;}
.footer-left{display:flex;align-items:center;gap:10px;}
.footer-logo{font-family:'Instrument Serif',serif;font-size:28px;letter-spacing:-1px;color:var(--black);}
.footer-logo em{font-style:italic;}
.footer-links{display:flex;gap:14px;}
.footer-links a{text-decoration:none;color:var(--g400);transition:color 0.15s;}
.footer-links a:hover{color:var(--black);}

/* ANIMATIONS */
@keyframes fadeUp{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0;transform:translateX(-6px)}to{opacity:1;transform:translateX(0)}}

/* RESPONSIVE */
@media(max-width:960px){
  nav,nav.scrolled{padding:0 20px;}
  .hero{grid-template-columns:1fr;gap:40px;padding:96px 20px 56px;}
  .hero-right{order:-1;}
  .section,.pricing-section,.faq-section{padding:64px 20px;}
  .pricing-inner{grid-template-columns:1fr;}
  .feature-row{grid-template-columns:1fr;}
  .stats-row{grid-template-columns:1fr;}
  .faq-grid{grid-template-columns:1fr;gap:32px;}
  .cta-band{margin:0 20px 48px;padding:28px 24px;flex-direction:column;align-items:flex-start;}
  footer{padding:32px 20px;}
}
@media(max-width:640px){
  .nav-links{display:none;}
  .hero{padding-top:86px;}
  .hero-sub{font-size:15px;}
  .section{padding-top:52px;padding-bottom:52px;}
}
</style>
</head>
<body>

<nav id="nav">
  <a href="/" class="nav-logo">Kynect<em>.</em></a>
  <div class="nav-links">
    <a href="#how-it-works">How it works</a>
    <a href="#pricing">Pricing</a>
    <a href="#faq">FAQ</a>
  </div>
  <div class="nav-actions">
    <a href="/signin" class="nav-signin">Sign in</a>
    <a href="/contact-finder" class="nav-cta">Get started</a>
  </div>
</nav>

<main>
  <!-- content identical to kynect-landing (13).html body ... -->
</main>

<script>
// (typing, scroll, and FAQ scripts from kynect-landing (13).html)
</script>
</body>
</html>
